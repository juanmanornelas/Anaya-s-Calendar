                })
              : React.createElement('span',{style:{flex:1,fontWeight:800,fontSize:'15px'}},pt.name),
            React.createElement('span',{style:{fontSize:'11px',background:'rgba(255,255,255,.2)',padding:'2px 10px',borderRadius:'20px',fontWeight:700}},
              ptStages.length+' stage'+(ptStages.length===1?'':'s')
            ),
            React.createElement('button',{title:'Rename',
              style:{background:'none',border:'none',color:'rgba(255,255,255,.8)',cursor:'pointer',fontSize:'14px',padding:'2px 6px'},
              onClick:e=>{e.stopPropagation();setEditingPTId(pt.id);setEditPTName(pt.name);}
            },'✏️'),
            React.createElement('button',{title:'Delete project type',
              style:{background:'none',border:'none',color:'rgba(255,255,255,.8)',cursor:'pointer',fontSize:'16px',padding:'2px 6px'},
              onClick:e=>{e.stopPropagation();if(window.confirm('Delete "'+pt.name+'"? Stages inside will become unassigned (not deleted).'))dispatch({type:'DELETE_PROJECT_TYPE',id:pt.id});}
            },'×'),
            React.createElement('span',{style:{fontSize:'14px',opacity:.7,marginLeft:'4px'}},isExpanded?'▲':'▼')
          ),

          // Expanded body
          isExpanded && React.createElement('div',{style:{padding:'16px 18px',background:'var(--bg2)',borderTop:'1px solid var(--border)'}},

            // Stages inside this type
            ptStages.length === 0
              ? React.createElement('p',{style:{fontSize:'12px',color:'var(--text3)',fontStyle:'italic',marginBottom:'12px'}},'No stages yet — add one below.')
              : ptStages.map(s => renderStage(s, pt.id)),

            // Divider
            React.createElement('div',{style:{borderTop:'1px solid var(--border)',margin:'14px 0'}}),

            // Add NEW stage to this type
            addingStageForPT === pt.id
              ? React.createElement('div',{style:{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'10px',padding:'14px',marginBottom:'10px'}},
                  React.createElement('div',{style:{fontWeight:700,fontSize:'12px',color:'var(--text2)',marginBottom:'10px',textTransform:'uppercase',letterSpacing:'.5px'}},'New Stage'),
                  React.createElement('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}},
                    React.createElement('input',{className:'form-input',style:{flex:1,minWidth:'140px'},
                      value:newStageName, onChange:e=>setNewStageName(e.target.value),
                      onKeyDown:e=>{if(e.key==='Enter')addStageToType(pt.id);},
                      placeholder:'Stage name', autoFocus:true
                    }),
                    React.createElement('input',{type:'color',value:newStageColor,onChange:e=>setNewStageColor(e.target.value),
                      title:'Stage color',style:{width:'38px',height:'38px',border:'1px solid var(--border)',borderRadius:'var(--r)',cursor:'pointer',padding:'2px',flexShrink:0}
                    }),
                    React.createElement('button',{className:'btn btn-primary btn-sm',onClick:()=>addStageToType(pt.id)},'+ Add'),
                    React.createElement('button',{className:'btn btn-ghost btn-sm',onClick:()=>setAddingStageForPT(null)},'Cancel')
                  )
                )
              : null,

            // Action buttons row
            React.createElement('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}},
              React.createElement('button',{className:'btn btn-primary btn-sm',
                onClick:()=>setAddingStageForPT(addingStageForPT===pt.id?null:pt.id)
              },'+ New Stage'),
              availableStages.length > 0 && React.createElement('select',{
                style:{fontSize:'12px',padding:'5px 8px',borderRadius:'6px',border:'1px solid var(--border)',background:'var(--bg)',color:'var(--text)',cursor:'pointer'},
                value:'', onChange:e=>{if(e.target.value)addExistingStageToType(pt.id,e.target.value);}
              },
                React.createElement('option',{value:''},'+ Add existing stage…'),
                availableStages.map(s=>React.createElement('option',{key:s.id,value:s.id},s.name))
              )
            )
          )
        );
      }),

    ),

    // ── Unassigned Stages ────────────────────────────────────────────────
    orphanStages.length > 0 && React.createElement('div',{style:{marginBottom:'24px'}},
      React.createElement('div',{style:{fontSize:'12px',fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:'10px'}},'⚠️ Unassigned Stages'),
      React.createElement('p',{style:{fontSize:'12px',color:'var(--text3)',marginBottom:'10px'}},'These stages exist but aren\'t in any project type. Drag them into a type or delete them.'),
      orphanStages.map(s => renderStage(s, null))
    )
  );
}
// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [page,setPage]=useState('schedule');
  const [data,setData]=useState(()=>loadData());
  const [toasts,setToasts]=useState([]);
  const [changePw,setChangePw]=useState(false);
  const [lang,setLang]=useState('en');
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState('');
  const [menuOpen,setMenuOpen]=useState(false);
  const [syncBusy,setSyncBusy]=useState(false);
  const [saveBusy,setSaveBusy]=useState(false);
  const [autoSaveStatus,setAutoSaveStatus]=useState(''); // 'saving' | 'saved' | 'conflict' | ''
  const [autoSaveTime,setAutoSaveTime]=useState(null); // Date of last successful autosave
  const [conflictInfo,setConflictInfo]=useState(null); // {savedBy, savedAt} of conflicting save
  const lastKnownSaveAt=React.useRef(null); // ISO string of last save we made or loaded
  const undoStack=React.useRef([]); // array of previous data snapshots (max 30)
  const isDirty=React.useRef(false); // true if data changed since last cloud save
  const lastUserAction=React.useRef(Date.now()); // timestamp of last user interaction
  const [activeUsers,setActiveUsers]=useState([]); // presence: who else is online
  const [remoteNewSave,setRemoteNewSave]=useState(null); // {savedBy, savedAt} when someone else saves

  // LANG global updated synchronously in toggle buttons, not just via effect
  useEffect(()=>{
    saveData(data);
    isDirty.current=true; // mark that we have unsaved changes
  },[data]);

  // ── Track user activity for idle detection ──────────────────────────────
  useEffect(()=>{
    const touch=()=>{lastUserAction.current=Date.now();};
    window.addEventListener('mousemove',touch,{passive:true});
    window.addEventListener('keydown',touch,{passive:true});
    window.addEventListener('touchstart',touch,{passive:true});
    window.addEventListener('click',touch,{passive:true});
    return ()=>{
      window.removeEventListener('mousemove',touch);
      window.removeEventListener('keydown',touch);
      window.removeEventListener('touchstart',touch);
      window.removeEventListener('click',touch);
    };
  },[]);


  // ── Auto-sync on window focus ────────────────────────────────────────────
  useEffect(()=>{
    if(!session||!getSyncUrl()) return;
    const onFocus=async()=>{
      if(saveBusy||syncBusy) return;
      const res=await cloudLoad();
      if(res.ok&&res.data){
        // Only reload if server has newer data than what we loaded
        if(res.savedAt&&lastKnownSaveAt.current&&res.savedAt>lastKnownSaveAt.current){
          setData(()=>{saveData(res.data);return res.data;});
          lastKnownSaveAt.current=res.savedAt;
          isDirty.current=false;
          toast('🔄 Synced latest changes from cloud','info');
        } else if(!lastKnownSaveAt.current&&res.savedAt){
          lastKnownSaveAt.current=res.savedAt;
        }
      }
    };
    window.addEventListener('focus',onFocus);
    return ()=>window.removeEventListener('focus',onFocus);
  },[session,saveBusy,syncBusy]);

  // ── Presence ping every 30s + poll who else is active + detect remote saves ─
  useEffect(()=>{
    if(!session||!getSyncUrl()) return;
    const tick=async()=>{
      // Ping our own presence
      presencePing(session.username||session.name);
      // Poll who else is active
      const others=await presenceLoad();
      setActiveUsers(others.filter(u=>(u.username||'').toLowerCase()!==(session.username||session.name||'').toLowerCase()));
      // Check if someone else saved since our last known save
      const check=await cloudCheckTimestamp();
      if(check&&check.savedAt&&lastKnownSaveAt.current&&check.savedAt>lastKnownSaveAt.current){
        const savedByOther=(check.savedBy||'').toLowerCase()!==(session.username||session.name||'').toLowerCase();
        if(savedByOther){
          setRemoteNewSave({savedBy:check.savedBy||'Someone',savedAt:check.savedAt});
        }
      }
    };
    tick();
    const id=setInterval(tick,30*1000);
    return ()=>clearInterval(id);
  },[session]);

  // ── Autosave every 30s — ONLY if dirty (data actually changed) ───────────
  useEffect(()=>{
    if(!getSyncUrl()) return;
    const INTERVAL_MS=30*1000;
    const run=async()=>{
      if(!session) return;
      if(saveBusy||syncBusy) return;
      if(autoSaveStatus==='conflict') return; // never save during unresolved conflict
      if(!isDirty.current) return; // nothing changed — skip silently
      // 1. Check server timestamp for conflicts
      const check=await cloudCheckTimestamp();
      if(!check||!check.savedAt){
        const res=await cloudSave(data,session.name);
        if(res.ok){
          lastKnownSaveAt.current=res.savedAt;
          isDirty.current=false;
          setAutoSaveTime(new Date());
          setAutoSaveStatus('saved');
          setTimeout(()=>setAutoSaveStatus(''),4000);
        }
        return;
      }
      // 2. Conflict — server is newer than what we know — NEVER auto-resolve, wait for human
      if(lastKnownSaveAt.current&&check.savedAt>lastKnownSaveAt.current){
        setConflictInfo({savedBy:check.savedBy||'Someone',savedAt:check.savedAt});
        setAutoSaveStatus('conflict');
        return; // stop all autosave until human resolves
      }
      // 3. No conflict — save
      setAutoSaveStatus('saving');
      const res=await cloudSave(data,session.name);
      if(res.ok){
        lastKnownSaveAt.current=res.savedAt;
        isDirty.current=false;
        setAutoSaveTime(new Date());
        setAutoSaveStatus('saved');
        setTimeout(()=>setAutoSaveStatus(''),4000);
      } else {
        setAutoSaveStatus('');
      }
    };
    const id=setInterval(run,INTERVAL_MS);
    return ()=>clearInterval(id);
  },[session,data,saveBusy,syncBusy,autoSaveStatus]);

  // ── Weekly Google Drive backup ───────────────────────────────────────────
  useEffect(()=>{
    const adminCheck=session&&session.role==='ADMIN';
    if(!adminCheck) return;
    const DAY_MS=24*60*60*1000;
    const check=async()=>{
      if(!session||!getDriveUrl()) return;
      const last=getLastDriveBackup();
      const now=Date.now();
      if(!last||now-new Date(last).getTime()>=DAY_MS){
        const res=await driveBackup(data);
        if(res.ok) toast('☁️ Daily Drive backup saved!','success');
      }
    };
    // Check on login, then every hour
    check();
    const id=setInterval(check,60*60*1000);
    return ()=>clearInterval(id);
  },[session]);

  const dispatch=useCallback(action=>{setData(d=>{undoStack.current=[d,...undoStack.current].slice(0,30);const next=reducer(d,action);saveData(next);return next;});},[]);

  // Ctrl+Z undo
  useEffect(()=>{
    const onKey=e=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){
        // Don't fire if user is typing in an input/textarea
        const tag=(document.activeElement||{}).tagName;
        if(tag==='INPUT'||tag==='TEXTAREA') return;
        if(undoStack.current.length===0){toast('Nothing to undo','info');return;}
        e.preventDefault();
        const prev=undoStack.current[0];
        undoStack.current=undoStack.current.slice(1);
        setData(()=>{saveData(prev);return prev;});
        toast('↩ Undone','success');
      }
    };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[]);

  // Smart dispatch that auto-writes worker activity logs for assignment changes
  const smartDispatch=useCallback(action=>{
    setData(d=>{
      undoStack.current=[d,...undoStack.current].slice(0,30);
      const next=reducer(d,action);
      let workerLogs={...(next.workerLogs||{})};
      const ts=new Date().toISOString();
      const addLog=(wId,type,jobName,date,detail,params)=>{
        const entry={id:genId(),workerId:wId,type,jobName,date,detail,params:params||null,ts};
        workerLogs[wId]=[entry,...(workerLogs[wId]||[])].slice(0,200);
      };
      const fmtD=ds=>ds?new Date(ds+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}):'';
      const jobName=(jobId)=>{const j=d.jobs.find(x=>x.id===jobId);return j?j.name||j.address||'Job':'Job';};
      if(action.type==='ADD_BLOCK_WITH_ASSIGNMENTS'){
        // Group all assignments for the same worker into ONE log entry
        const byWorker={};
        (action.assignments||[]).forEach(a=>{
          if(!byWorker[a.workerId]) byWorker[a.workerId]=[];
          byWorker[a.workerId].push(a);
        });
        Object.entries(byWorker).forEach(([wId,assigns])=>{
          const a=assigns[0];
          const timeStr=a.startTime?fmtTime(a.startTime)+(a.endTime?'–'+fmtTime(a.endTime):''):'';
          const days=assigns.length;
          const stage=action.block.stage||'';
          const params={type:'block_assigned',job:jobName(a.jobId),stage,days,date:fmtD(a.scheduledDate),timeStr,task:a.task||''};
          const detail='📅 Assigned to '+jobName(a.jobId)+(stage?' · '+stage:'')+' · '+days+(days===1?' day':' days')+' starting '+fmtD(a.scheduledDate)+(timeStr?' · '+timeStr:'')+(a.task?' · Task: '+a.task:'');
          addLog(wId,'assigned',jobName(a.jobId),a.scheduledDate,detail,params);
        });
      } else if(action.type==='ADD_ASSIGNMENT'){
        const a=action.assignment;
        const timeStr=a.startTime?fmtTime(a.startTime)+(a.endTime?'–'+fmtTime(a.endTime):''):'';
        {const params2={type:'single_assigned',job:jobName(a.jobId),date:fmtD(a.scheduledDate),timeStr,task:a.task||''};
        const detail2='📅 Added to '+jobName(a.jobId)+' on '+fmtD(a.scheduledDate)+(timeStr?' · '+timeStr:'')+(a.task?' · Task: '+a.task:'');
        addLog(a.workerId,'assigned',jobName(a.jobId),a.scheduledDate,detail2,params2);}
      } else if(action.type==='DELETE_ASSIGNMENT'){
        const a=d.assignments.find(x=>x.id===action.id);
        if(a){const params3={type:'removed',job:jobName(a.jobId),date:fmtD(a.scheduledDate)};
        const detail3='🗑 Removed from '+jobName(a.jobId)+' on '+fmtD(a.scheduledDate);
        addLog(a.workerId,'removed',jobName(a.jobId),a.scheduledDate,detail3,params3);}
      } else if(action.type==='UPDATE_ASSIGNMENT'){
        const a=d.assignments.find(x=>x.id===action.id);
        if(a){
          const changes=[];
          const isEs=LANG==='es';
          if(action.data.startTime!==undefined||action.data.endTime!==undefined){
            const st=action.data.startTime||a.startTime||'';
            const et=action.data.endTime||a.endTime||'';
            if(st) changes.push((isEs?t('notifTimeLabel'):'⏰ Time: ')+fmtTime(st)+(et?'–'+fmtTime(et):''));
          }
          if(action.data.task!==undefined&&action.data.task!==a.task)
            changes.push((isEs?t('notifTaskLabel'):'📝 Task: ')+(action.data.task||(isEs?t('notifTaskCleared'):'(cleared)')));
          if(action.data.plannedHours!==undefined&&action.data.plannedHours!==a.plannedHours)
            changes.push((isEs?t('notifHoursLabel'):'⏱ Hours: ')+action.data.plannedHours+'h');
          if(changes.length>0){
            const rawChanges=[];
            if(action.data.startTime!==undefined||action.data.endTime!==undefined){const st2=action.data.startTime||a.startTime||'';const et2=action.data.endTime||a.endTime||'';if(st2)rawChanges.push({k:'time',v:fmtTime(st2)+(et2?'–'+fmtTime(et2):'')});}
            if(action.data.task!==undefined&&action.data.task!==a.task)rawChanges.push({k:'task',v:action.data.task||''});
            if(action.data.plannedHours!==undefined&&action.data.plannedHours!==a.plannedHours)rawChanges.push({k:'hours',v:String(action.data.plannedHours)});
            const params4={type:'updated',job:jobName(a.jobId),date:fmtD(a.scheduledDate),changes:rawChanges};
            const detail4=changes.join(' · ')+' — '+jobName(a.jobId)+' '+fmtD(a.scheduledDate);
            addLog(a.workerId,'updated',jobName(a.jobId),a.scheduledDate,detail4,params4);}
        }
      }
      let finalState=next;
      if(Object.keys(workerLogs).some(k=>workerLogs[k]!==((d.workerLogs||{})[k])))
        finalState={...finalState,workerLogs};
      saveData(finalState);
      return finalState;
    });
  },[]);
  const toast=useCallback((msg,type='success')=>{const id=genId();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);},[]);
  const isAdmin=session?session.role==='ADMIN':false;

  // ── Handle login: show loading screen, attempt cloud sync, then enter app ──
  const handleLogin=async(u)=>{
    setSession(u);
    if(!getSyncUrl()){return;} // no server — skip loading screen
    setSyncing(true);
    setSyncMsg('☁️ Syncing latest schedule...');
    // Hard timeout: if fetch hangs or CORS blocks it (e.g. GitHub Pages), 
    // always clear the syncing screen after 4s so app never gets stuck
    const syncTimeout=setTimeout(()=>setSyncing(false),4000);
    try{
      const res=await cloudLoad();
      if(res.ok&&res.data){
        setData(d=>{const next=res.data;saveData(next);return next;});
        setSyncMsg('✅ Schedule synced!');
      } else {
        setSyncMsg(res.reason==='No data saved yet'?'📋 No cloud data yet — using local':'⚠️ Could not reach sync server. Using local data.');
      }
    }catch(e){
      setSyncMsg('⚠️ Sync failed. Using local data.');
    }finally{
      clearTimeout(syncTimeout);
      setTimeout(()=>setSyncing(false),1200);
    }
  };

  const handleSync=async()=>{
    if(!getSyncUrl()){toast('⚠️ No sync server configured yet','error');return;}
    setSyncBusy(true);
    const res=await cloudLoad();
    setSyncBusy(false);
    if(res.ok&&res.data){
      setData(()=>{saveData(res.data);return res.data;});
      if(res.savedAt) lastKnownSaveAt.current=res.savedAt;
      isDirty.current=false;
      toast('🔄 Schedule refreshed from cloud!','success');
    } else {
      toast('⚠️ Refresh failed: '+(res.reason||'unknown'),'error');
    }
  };

  // ── Save Changes = push current data up to cloud ──────────────────────────
  const handleCloudSave=async()=>{
    if(!getSyncUrl()){toast('⚠️ No sync server configured yet','error');return;}
    setSaveBusy(true);
    const res=await cloudSave(data,session?session.name:'Unknown');
    setSaveBusy(false);
    if(res.ok){
      if(res.savedAt) lastKnownSaveAt.current=res.savedAt;
      isDirty.current=false;
      toast('☁️ Changes saved to cloud!','success');
    } else toast('⚠️ Save failed: '+(res.reason||'unknown'),'error');
  };

  // ── Show login page ──────────────────────────────────────────────────────── 
  if(!session) return React.createElement(LoginPage,{users:data.users,lang,setLang,onLogin:handleLogin});

  // ── Loading / Sync screen (shown briefly after login if server configured) ─
  if(syncing) return React.createElement('div',{style:{
    position:'fixed',inset:0,background:'linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#1e40af 100%)',
    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
    gap:'20px',zIndex:99999
  }},
    React.createElement('div',{style:{
      width:'64px',height:'64px',border:'5px solid rgba(255,255,255,0.2)',
      borderTopColor:'#fff',borderRadius:'50%',
      animation:'spin 0.8s linear infinite'
    }}),
    React.createElement('div',{style:{color:'#fff',fontSize:'18px',fontWeight:700,textAlign:'center',letterSpacing:'-.3px'}},syncMsg),
    React.createElement('div',{style:{color:'rgba(255,255,255,0.5)',fontSize:'13px'}},"Anaya's Calendar"),
    React.createElement('style',null,'@keyframes spin{to{transform:rotate(360deg)}}')
  );

  const handleChangePw=form=>{
    const uData={};if(form.username&&form.username.trim()&&form.username.trim()!==session.username)uData.username=form.username.trim();if(form.password&&form.password.trim())uData.password=form.password.trim();if(Object.keys(uData).length>0){dispatch({type:'UPDATE_USER',id:session.id,data:uData});toast('Account updated','success');}else{toast('No changes made','info');}
    setChangePw(false);
  };

  let pageContent;
  if(page==='schedule') pageContent=React.createElement(SchedulerPage,{data,isAdmin,session,dispatch:smartDispatch,toast,lang});
  else if(page==='jobs') pageContent=React.createElement('div',{className:'main'},React.createElement(JobsPage,{data,isAdmin,dispatch:smartDispatch,toast}));
  else if(page==='contracted'&&isAdmin) pageContent=React.createElement('div',{className:'main'},React.createElement(ContractedPage,{data,isAdmin,dispatch:smartDispatch,toast}));
  else if(page==='projected'&&isAdmin) pageContent=React.createElement('div',{className:'main'},React.createElement(ProjectedPage,{data,isAdmin,dispatch:smartDispatch,toast}));
  else if(page==='completed'&&isAdmin) pageContent=React.createElement('div',{className:'main'},React.createElement(CompletedPage,{data,isAdmin,dispatch:smartDispatch,toast}));
  else if(page==='workers'&&isAdmin) pageContent=React.createElement('div',{className:'main'},React.createElement(WorkersPage,{data,isAdmin,dispatch:smartDispatch,toast}));
  else if(page==='stages'&&isAdmin) pageContent=React.createElement('div',{className:'main'},React.createElement(StagesPage,{data,dispatch:smartDispatch,toast}));
  else if(page==='updates'&&!isAdmin) pageContent=React.createElement('div',{className:'main'},React.createElement(WorkerUpdatesPage,{data,session,dispatch:smartDispatch,toast}));
  if(!pageContent) pageContent=React.createElement(SchedulerPage,{data,isAdmin,session,dispatch:smartDispatch,toast,lang});

  const navTo=p=>{setPage(p);setMenuOpen(false);};

  return React.createElement('div',{className:'app'},
    // ── Desktop + Mobile navbar ──────────────────────────────────────────────
    React.createElement('nav',{className:'navbar'},
      React.createElement('div',{className:'nav-logo'},
        React.createElement('img',{src:'data:image/jpeg;base64,'+LOGO_B64,className:'nav-logo-img',alt:"Anaya's",style:{background:'none',padding:0}}),
        React.createElement('span',{className:'nav-logo-brand'},"Anaya's"),
        React.createElement('span',{className:'nav-logo-sub'},t('schedule'))),
      // Desktop nav links (hidden on mobile via CSS)
      React.createElement('div',{className:'nav-links'},
        React.createElement('button',{className:'nav-link'+(page==='schedule'?' active':''),onClick:()=>setPage('schedule')},'📅 '+t('schedule')),
        React.createElement('button',{className:'nav-link'+(page==='jobs'?' active':''),onClick:()=>setPage('jobs')},'🏠 '+t('jobs')),
        isAdmin?React.createElement('button',{className:'nav-link'+(page==='contracted'?' active':''),onClick:()=>setPage('contracted')},'📋 '+t('contracted')):null,
        isAdmin?React.createElement('button',{className:'nav-link'+(page==='projected'?' active':''),onClick:()=>setPage('projected')},'🔮 '+t('projected')):null,
        isAdmin?React.createElement('button',{className:'nav-link'+(page==='completed'?' active':''),onClick:()=>setPage('completed')},'✅ '+t('completed')):null,
        isAdmin?React.createElement('button',{className:'nav-link'+(page==='stages'?' active':''),onClick:()=>setPage('stages')},'📋 '+t('stages')):null,
        isAdmin?React.createElement('button',{className:'nav-link'+(page==='workers'?' active':''),onClick:()=>setPage('workers')},'👷 '+t('workers')):null,

        !isAdmin?(()=>{
          const wId=session.workerId;
          const unread=(data.workerLogs&&data.workerLogs[wId]||[]).filter(e=>!e.read).length;
          return React.createElement('button',{className:'nav-link'+(page==='updates'?' active':''),onClick:()=>setPage('updates'),style:{position:'relative'}},
            (LANG==='es'?'🔔 Mis Actualizaciones':'🔔 My Updates'),
            unread>0?React.createElement('span',{style:{
              position:'absolute',top:'2px',right:'2px',
              background:'#ef4444',color:'#fff',fontSize:'9px',fontWeight:800,
              borderRadius:'10px',padding:'1px 5px',lineHeight:'1.4',minWidth:'16px',textAlign:'center'

// ── WORKER UPDATES PAGE ───────────────────────────────────────────────────────
function WorkerUpdatesPage({data,session,dispatch,toast}){
  const wId=session.workerId;
  const logs=(data.workerLogs&&data.workerLogs[wId])||[];
  const worker=data.workers.find(w=>w.id===wId);
  const wColor=worker&&worker.color?worker.color:'#6366f1';

  // Mark all as read when page is opened
  React.useEffect(()=>{
    if(logs.some(e=>!e.read)){
      dispatch({type:'MARK_LOGS_READ',workerId:wId});
    }
  },[]);

  const typeIcon={assigned:'✅',removed:'🗑',updated:'✏️',time_set:'⏰'};
  const typeBg={
    assigned:'var(--green-dim)',removed:'rgba(239,68,68,.1)',
    updated:'var(--blue-dim)',time_set:'rgba(124,58,237,.1)'
  };
  const typeColor={
    assigned:'var(--green)',removed:'#ef4444',
    updated:'var(--blue)',time_set:'#7c3aed'
  };
  const typeLabel={
    assigned:LANG==='es'?'Asignado':'Assigned',
    removed:LANG==='es'?'Eliminado':'Removed',
    updated:LANG==='es'?'Actualizado':'Updated',
    time_set:LANG==='es'?'Hora Fijada':'Time Set'
  };

  const grouped=React.useMemo(()=>{
    const groups={};
    logs.forEach(e=>{
      const day=e.ts?e.ts.split('T')[0]:'unknown';
      if(!groups[day]) groups[day]=[];
      groups[day].push(e);
    });
    return Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0]));
  },[logs]);

  const fmtTs=ts=>{
    if(!ts) return '';
    const d=new Date(ts);
    const locale=LANG==='es'?'es-MX':'en-US';
    return d.toLocaleDateString(locale,{month:'short',day:'numeric',year:'numeric'})+
      ' · '+d.toLocaleTimeString(locale,{hour:'numeric',minute:'2-digit'});
  };

  return React.createElement('div',{style:{flex:1,overflowY:'auto',padding:'20px',maxWidth:'700px',margin:'0 auto',width:'100%'}},
    // Header
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px'}},
      React.createElement('div',{style:{width:'40px',height:'40px',borderRadius:'50%',background:wColor,border:'3px solid rgba(0,0,0,.1)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px'}},'👷'),
      React.createElement('div',null,
        React.createElement('div',{style:{fontSize:'20px',fontWeight:800,color:'var(--text)'}},worker?worker.name:(LANG==='es'?'Mis Actualizaciones':'My Updates')),
        React.createElement('div',{style:{fontSize:'13px',color:'var(--text3)'}},(LANG==='es'?'Tus actualizaciones y cambios de horario':'Your schedule updates and changes'))
      ),
      logs.length>0?React.createElement('button',{
        className:'btn btn-ghost btn-sm',
        style:{marginLeft:'auto',fontSize:'11px',color:'var(--text3)'},
        onClick:()=>{if(window.confirm(LANG==='es'?'¿Borrar todo el historial?':'Clear all your update history?'))dispatch({type:'CLEAR_WORKER_LOG',workerId:wId});}
      },'🗑 Clear all'):null
    ),
    // Empty state
    logs.length===0?React.createElement('div',{style:{
      textAlign:'center',padding:'60px 20px',background:'var(--bg2)',
      borderRadius:'var(--r2)',border:'1px solid var(--border)'
    }},
      React.createElement('div',{style:{fontSize:'48px',marginBottom:'12px'}},'📭'),
      React.createElement('div',{style:{fontSize:'16px',fontWeight:700,color:'var(--text)',marginBottom:'6px'}},LANG==='es'?'Sin actualizaciones aún':'No updates yet'),
      React.createElement('div',{style:{fontSize:'13px',color:'var(--text3)'}},(LANG==='es'?'Cuando el admin te asigne a un trabajo o cambie tu horario, aparecerá aquí.':'When your admin assigns you to a job or changes your schedule, it will appear here.'))
    ):
    // Log entries grouped by day
    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'20px'}},
      grouped.map(([day,entries])=>{
        const dayLabel=new Date(day+'T12:00:00').toLocaleDateString(LANG==='es'?'es-MX':'en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
        return React.createElement('div',{key:day},
          React.createElement('div',{style:{fontSize:'11px',fontWeight:700,textTransform:'uppercase',letterSpacing:'.8px',color:'var(--text3)',marginBottom:'8px',paddingBottom:'6px',borderBottom:'1px solid var(--border)'}},dayLabel),
          React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},
            entries.map(e=>React.createElement('div',{key:e.id,style:{
              background:'var(--bg2)',border:'1px solid var(--border)',
              borderRadius:'var(--r)',padding:'12px 14px',
              borderLeft:'4px solid '+(typeColor[e.type]||'var(--blue)')
            }},
              React.createElement('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}},
                React.createElement('span',{style:{
                  fontSize:'10px',fontWeight:700,padding:'2px 8px',borderRadius:'20px',
                  background:typeBg[e.type]||'var(--blue-dim)',
                  color:typeColor[e.type]||'var(--blue)'
                }},typeIcon[e.type]+' '+(typeLabel[e.type]||e.type)),
                React.createElement('span',{style:{fontSize:'11px',color:'var(--text3)',marginLeft:'auto'}},fmtTs(e.ts)),
                React.createElement('button',{
                  onClick:()=>dispatch({type:'DELETE_LOG_ENTRY',workerId:wId,entryId:e.id}),
                  title:LANG==='es'?'Eliminar':'Delete',
                  style:{background:'none',border:'none',cursor:'pointer',fontSize:'13px',color:'var(--text3)',padding:'2px 4px',lineHeight:1,opacity:.5,transition:'opacity .15s'},
                  onMouseEnter:ev=>ev.target.style.opacity=1,
                  onMouseLeave:ev=>ev.target.style.opacity=.5
                },'×')
              ),
              React.createElement('div',{style:{fontSize:'13px',color:'var(--text)',lineHeight:'1.5'}},(()=>{
                const p=e.params;
                if(!p) return e.detail||e.jobName;
                const isEs=LANG==='es';
                if(p.type==='block_assigned'){
                  return (isEs?'📅 Asignado a':'📅 Assigned to')+' '+p.job+(p.stage?' · '+p.stage:'')+' · '+p.days+(p.days===1?(isEs?' día':' day'):(isEs?' días':' days'))+(isEs?' iniciando':' starting')+' '+p.date+(p.timeStr?' · '+p.timeStr:'')+(p.task?(isEs?' · Tarea: ':' · Task: ')+p.task:'');
                }
                if(p.type==='single_assigned'){
                  return (isEs?'📅 Asignado a':'📅 Added to')+' '+p.job+(isEs?' el ':' on ')+p.date+(p.timeStr?' · '+p.timeStr:'')+(p.task?(isEs?' · Tarea: ':' · Task: ')+p.task:'');
                }
                if(p.type==='removed'){
                  return (isEs?'🗑 Eliminado de':'🗑 Removed from')+' '+p.job+(isEs?' el ':' on ')+p.date;
                }
                if(p.type==='updated'){
                  const parts=(p.changes||[]).map(c=>{
                    if(c.k==='time') return(isEs?'⏰ Hora: ':'⏰ Time: ')+c.v;
                    if(c.k==='task') return(isEs?'📝 Tarea: ':'📝 Task: ')+(c.v||(isEs?'(eliminada)':'(cleared)'));
                    if(c.k==='hours') return(isEs?'⏱ Horas: ':'⏱ Hours: ')+c.v+'h';
                    return c.v;
                  });
                  return parts.join(' · ')+' — '+p.job+' '+p.date;
                }
                return e.detail||e.jobName;
              })())
            ))
          )
        );
      })
    )
  );
}

// ── ADMIN NOTIFICATIONS PAGE ──────────────────────────────────────────────────
function LoginPage({users,onLogin,lang,setLang}){
  const [username,setUsername]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');

  const submit=()=>{
    // Check hardcoded admins first
    const ha=HARDCODED_ADMINS.find(a=>(a.username||'').toLowerCase()===username.toLowerCase()&&a.password===pw);
    if(ha){
      const storedVersion=users.find(u=>u.id===ha.id)||ha;
      onLogin({...ha,...storedVersion,role:'ADMIN'});return;
    }
    // Check stored users (username match)
    const u=users.find(u=>(u.username||'').toLowerCase()===username.toLowerCase()&&u.password===pw);
    if(!u){setErr(t('invalidUsernameOrPw'));return;}
    onLogin(u);
  };
  const hk=e=>{if(e.key==='Enter')submit();};
  return React.createElement('div',{className:'login-wrap'},
